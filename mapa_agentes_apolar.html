<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🧠 Arquitetura Multi-Agente — Apolar Franquias</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    color: #fff;
  }
  #title {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,0.07);
    padding: 10px 28px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    z-index: 100;
    letter-spacing: 1px;
  }
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 12px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  #legend div { margin: 5px 0; display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  #tooltip {
    position: fixed;
    background: rgba(10,14,26,0.95);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 13px;
    max-width: 260px;
    pointer-events: none;
    display: none;
    z-index: 200;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip h4 { font-size: 15px; margin-bottom: 6px; }
  #tooltip p { opacity: 0.8; line-height: 1.5; font-size: 12px; }
  #tooltip .badge {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    margin-top: 6px;
  }
  svg { width: 100vw; height: 100vh; }
  .link {
    stroke-opacity: 0.4;
    stroke-width: 2;
    fill: none;
  }
  .node circle {
    stroke-width: 2.5;
    cursor: pointer;
    transition: all 0.2s;
    filter: drop-shadow(0 0 8px currentColor);
  }
  .node:hover circle {
    stroke-width: 4;
    filter: drop-shadow(0 0 20px currentColor);
  }
  .node text {
    font-size: 12px;
    fill: #fff;
    text-anchor: middle;
    pointer-events: none;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .node .emoji {
    font-size: 18px;
    dominant-baseline: central;
  }
  .node .label {
    dominant-baseline: hanging;
    font-size: 11px;
    opacity: 0.9;
  }
  .node .sublabel {
    font-size: 9.5px;
    opacity: 0.6;
    dominant-baseline: hanging;
  }
  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; r: 0; }
    50% { opacity: 0; r: 30px; }
  }
</style>
</head>
<body>
<div id="title">🧠 Arquitetura Multi-Agente — Apolar Franquias 2026</div>
<div id="tooltip"></div>
<div id="legend">
  <div><span class="dot" style="background:#6c63ff"></span> Orquestrador</div>
  <div><span class="dot" style="background:#00d4aa"></span> Agentes Operacionais</div>
  <div><span class="dot" style="background:#ff6b6b"></span> Agentes de Suporte</div>
  <div><span class="dot" style="background:#ffa94d"></span> Infraestrutura</div>
  <div style="margin-top:8px;opacity:0.5;font-size:11px">🖱 Arraste · Scroll para zoom · Hover para detalhes</div>
</div>
<svg id="svg"></svg>

<script>
const nodes = [
  // Centro — Orquestrador
  {
    id: "mar", emoji: "🧠", label: "MAR", sublabel: "Orquestrador Central",
    color: "#6c63ff", r: 52, fx: 0, fy: 0,
    model: "Claude Sonnet 4.6", host: "OpenClaw (atual)",
    desc: "Ponto central de inteligência. Recebe requests do Marco via Telegram, decide qual agente acionar, consolida respostas e aprende ao longo do tempo.",
    cost: "Já incluído"
  },
  // Agentes principais
  {
    id: "marketing", emoji: "🎯", label: "Marketing", sublabel: "Meta · Google · UTM",
    color: "#00d4aa", r: 38,
    model: "Claude Haiku 4.6", host: "Google Cloud Run",
    desc: "Monitora campanhas Meta Ads e Google Ads 24/7. Detecta quedas de performance, calcula ROI por canal, otimiza budget automaticamente.",
    cost: "~R$30/mês"
  },
  {
    id: "pipeline", emoji: "🏢", label: "Pipeline", sublabel: "Salesforce · CRM · Leads",
    color: "#00d4aa", r: 38,
    model: "DeepSeek V3", host: "Railway.app",
    desc: "Gestão completa do funil de franquias. Lead scoring automático, detecta oportunidades paradas, prepara reuniões e gera forecast vs realizado.",
    cost: "~R$25/mês"
  },
  {
    id: "bianca", emoji: "🤖", label: "Bianca", sublabel: "VAPI · Chamadas · WhatsApp",
    color: "#00d4aa", r: 38,
    model: "GPT-4o mini", host: "Render.com",
    desc: "SDR AI que liga automaticamente para novos leads em <5 min. Qualifica por voz em PT-BR, registra transcrição no Salesforce e agenda reuniões.",
    cost: "~R$25/mês"
  },
  {
    id: "reports", emoji: "📊", label: "Relatórios", sublabel: "KPIs · Dashboards · Alertas",
    color: "#ff6b6b", r: 38,
    model: "Claude Haiku 4.6", host: "Cloud Functions",
    desc: "Gera relatório executivo diário às 8h30 BRT, fechamento às 18h e análise semanal às segundas. Consolida dados de todos os agentes.",
    cost: "~R$15/mês"
  },
  {
    id: "comms", emoji: "📧", label: "Comms", sublabel: "Gmail · Templates · Follow-up",
    color: "#ff6b6b", r: 38,
    model: "DeepSeek V3", host: "Vercel (free)",
    desc: "Escreve emails no estilo Marco Vieira. Executa sequências de nurturing de 6 emails por ICP, follow-ups automáticos e templates personalizados.",
    cost: "R$0/mês"
  },
  {
    id: "agenda", emoji: "📅", label: "Agenda", sublabel: "Google Calendar · Reuniões",
    color: "#ff6b6b", r: 38,
    model: "Gemini Flash", host: "Google Cloud",
    desc: "Monitora Google Calendar, prepara briefings antes de cada reunião, detecta conflitos e gerencia lembretes inteligentes de prospecção.",
    cost: "~R$10/mês"
  },
  // Infraestrutura
  {
    id: "redis", emoji: "⚡", label: "Redis", sublabel: "Message Bus",
    color: "#ffa94d", r: 28,
    model: "Upstash Redis", host: "Upstash Cloud",
    desc: "Message bus para comunicação em tempo real entre agentes. Pub/Sub events: novo lead → Bianca aciona → Salesforce atualiza → Marco notificado.",
    cost: "~R$20/mês"
  },
  {
    id: "supabase", emoji: "🗄️", label: "Supabase", sublabel: "PostgreSQL Central",
    color: "#ffa94d", r: 28,
    model: "PostgreSQL", host: "Supabase Cloud",
    desc: "Banco de dados central. Armazena leads, oportunidades, campanhas, histórico de chamadas e logs de todos os agentes com real-time sync.",
    cost: "R$0-100/mês"
  },
  {
    id: "n8n", emoji: "🔄", label: "n8n", sublabel: "Automações & Workflows",
    color: "#ffa94d", r: 28,
    model: "n8n Cloud", host: "n8n.io",
    desc: "Orquestra workflows visuais: lead novo SF → Bianca → CRM update → Email → WhatsApp → Calendário → Notifica Marco. Conecta qualquer API.",
    cost: "~R$100/mês"
  },
  {
    id: "grafana", emoji: "📈", label: "Grafana", sublabel: "Monitoramento",
    color: "#ffa94d", r: 28,
    model: "Grafana Cloud", host: "Grafana Cloud",
    desc: "Dashboards de monitoramento em tempo real: uptime dos agentes, performance das campanhas, métricas do pipeline e alertas de sistema.",
    cost: "R$0/mês"
  },
];

const links = [
  // MAR → Agentes
  { source: "mar", target: "marketing", color: "#6c63ff" },
  { source: "mar", target: "pipeline", color: "#6c63ff" },
  { source: "mar", target: "bianca", color: "#6c63ff" },
  { source: "mar", target: "reports", color: "#6c63ff" },
  { source: "mar", target: "comms", color: "#6c63ff" },
  { source: "mar", target: "agenda", color: "#6c63ff" },
  // Infra
  { source: "mar", target: "redis", color: "#ffa94d" },
  { source: "mar", target: "supabase", color: "#ffa94d" },
  { source: "mar", target: "n8n", color: "#ffa94d" },
  { source: "mar", target: "grafana", color: "#ffa94d" },
  // Inter-agentes
  { source: "pipeline", target: "bianca", color: "#00d4aa" },
  { source: "pipeline", target: "comms", color: "#00d4aa" },
  { source: "bianca", target: "agenda", color: "#00d4aa" },
  { source: "marketing", target: "reports", color: "#00d4aa" },
  { source: "pipeline", target: "reports", color: "#00d4aa" },
  // Todos → infra
  { source: "pipeline", target: "supabase", color: "#ffa94d44" },
  { source: "marketing", target: "supabase", color: "#ffa94d44" },
  { source: "bianca", target: "redis", color: "#ffa94d44" },
  { source: "n8n", target: "bianca", color: "#ffa94d44" },
];

const width = window.innerWidth;
const height = window.innerHeight;
const cx = width / 2;
const cy = height / 2;

const svg = d3.select("#svg");
const tooltip = document.getElementById("tooltip");

// Defs: gradients + glow
const defs = svg.append("defs");

// Glow filter
const filter = defs.append("filter").attr("id", "glow");
filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
const feMerge = filter.append("feMerge");
feMerge.append("feMergeNode").attr("in", "coloredBlur");
feMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Background gradient
const bg = defs.append("radialGradient").attr("id", "bg").attr("cx", "50%").attr("cy", "50%").attr("r", "70%");
bg.append("stop").attr("offset", "0%").attr("stop-color", "#111827");
bg.append("stop").attr("offset", "100%").attr("stop-color", "#0a0e1a");
svg.append("rect").attr("width", "100%").attr("height", "100%").attr("fill", "url(#bg)");

// Grid dots
const gridGroup = svg.append("g").attr("opacity", 0.07);
for(let x = 0; x < width; x += 40) {
  for(let y = 0; y < height; y += 40) {
    gridGroup.append("circle").attr("cx", x).attr("cy", y).attr("r", 1).attr("fill", "#fff");
  }
}

// Main group with zoom
const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.3, 3]).on("zoom", e => g.attr("transform", e.transform)));

// Position nodes in circle
const mainAgents = ["marketing", "pipeline", "bianca", "reports", "comms", "agenda"];
const infraNodes = ["redis", "supabase", "n8n", "grafana"];
const mainR = Math.min(width, height) * 0.27;
const infraR = Math.min(width, height) * 0.44;

nodes.forEach(n => {
  if(n.id === "mar") { n.x = cx; n.y = cy; return; }
  const mainIdx = mainAgents.indexOf(n.id);
  if(mainIdx >= 0) {
    const angle = (mainIdx / mainAgents.length) * 2 * Math.PI - Math.PI/2;
    n.x = cx + mainR * Math.cos(angle);
    n.y = cy + mainR * Math.sin(angle);
    return;
  }
  const infraIdx = infraNodes.indexOf(n.id);
  if(infraIdx >= 0) {
    const angle = (infraIdx / infraNodes.length) * 2 * Math.PI - Math.PI/4;
    n.x = cx + infraR * Math.cos(angle);
    n.y = cy + infraR * Math.sin(angle);
  }
});

const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

// Draw links
const linkSel = g.selectAll(".link")
  .data(links)
  .enter().append("path")
  .attr("class", "link")
  .attr("stroke", d => d.color)
  .attr("d", d => {
    const s = nodeMap[d.source];
    const t = nodeMap[d.target];
    const mx = (s.x + t.x) / 2;
    const my = (s.y + t.y) / 2 - 30;
    return `M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`;
  })
  .attr("stroke-dasharray", function() { return this.getTotalLength(); })
  .attr("stroke-dashoffset", function() { return this.getTotalLength(); });

// Animate links
linkSel.transition().duration(1200).delay((d, i) => i * 80)
  .attr("stroke-dashoffset", 0);

// Draw nodes
const nodeGroups = g.selectAll(".node")
  .data(nodes)
  .enter().append("g")
  .attr("class", "node")
  .attr("transform", d => `translate(${d.x},${d.y})`)
  .style("cursor", "pointer")
  .on("mouseover", function(event, d) {
    tooltip.style.display = "block";
    tooltip.innerHTML = `
      <h4>${d.emoji} ${d.label}</h4>
      <p>${d.desc}</p>
      <span class="badge">🤖 ${d.model}</span>
      <span class="badge">☁️ ${d.host}</span>
      <span class="badge">💰 ${d.cost}</span>
    `;
  })
  .on("mousemove", function(event) {
    tooltip.style.left = (event.clientX + 16) + "px";
    tooltip.style.top = (event.clientY - 10) + "px";
  })
  .on("mouseout", function() {
    tooltip.style.display = "none";
  })
  .call(d3.drag()
    .on("start", function(event, d) { d3.select(this).raise(); })
    .on("drag", function(event, d) {
      d.x = event.x; d.y = event.y;
      d3.select(this).attr("transform", `translate(${d.x},${d.y})`);
      linkSel.attr("d", l => {
        const s = nodeMap[l.source];
        const t = nodeMap[l.target];
        const mx = (s.x + t.x) / 2;
        const my = (s.y + t.y) / 2 - 30;
        return `M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`;
      });
    })
  );

// Pulse ring for MAR
nodeGroups.filter(d => d.id === "mar")
  .append("circle")
  .attr("r", 60).attr("fill", "none")
  .attr("stroke", "#6c63ff").attr("stroke-width", 1.5)
  .attr("opacity", 0.3)
  .attr("class", "pulse");

nodeGroups.filter(d => d.id === "mar")
  .append("circle")
  .attr("r", 80).attr("fill", "none")
  .attr("stroke", "#6c63ff").attr("stroke-width", 1)
  .attr("opacity", 0.15)
  .attr("class", "pulse")
  .style("animation-delay", "0.8s");

// Node background gradient
nodes.forEach(n => {
  const grad = defs.append("radialGradient")
    .attr("id", `grad-${n.id}`)
    .attr("cx", "35%").attr("cy", "35%").attr("r", "65%");
  grad.append("stop").attr("offset", "0%").attr("stop-color", n.color).attr("stop-opacity", 0.9);
  grad.append("stop").attr("offset", "100%").attr("stop-color", n.color).attr("stop-opacity", 0.4);
});

// Circles
nodeGroups.append("circle")
  .attr("r", d => d.r)
  .attr("fill", d => `url(#grad-${d.id})`)
  .attr("stroke", d => d.color)
  .attr("filter", "url(#glow)")
  .attr("r", 0)
  .transition().duration(600).delay((d, i) => i * 100)
  .attr("r", d => d.r);

// Emoji
nodeGroups.append("text")
  .attr("class", "emoji")
  .attr("text-anchor", "middle")
  .attr("y", d => d.id === "mar" ? -10 : -6)
  .text(d => d.emoji)
  .attr("opacity", 0)
  .transition().duration(400).delay((d, i) => 600 + i * 100)
  .attr("opacity", 1);

// Label
nodeGroups.append("text")
  .attr("class", "label")
  .attr("text-anchor", "middle")
  .attr("y", d => d.id === "mar" ? 10 : 8)
  .text(d => d.label)
  .attr("opacity", 0)
  .transition().duration(400).delay((d, i) => 700 + i * 100)
  .attr("opacity", 1);

// Sublabel
nodeGroups.append("text")
  .attr("class", "sublabel")
  .attr("text-anchor", "middle")
  .attr("y", d => d.id === "mar" ? 24 : d.r < 35 ? 20 : 22)
  .text(d => d.sublabel)
  .attr("opacity", 0)
  .transition().duration(400).delay((d, i) => 800 + i * 100)
  .attr("opacity", 1);

// Flow animation on links
function animateFlow() {
  g.selectAll(".flow-dot").remove();
  links.slice(0, 6).forEach((link, i) => {
    const s = nodeMap[link.source];
    const t = nodeMap[link.target];
    const dot = g.append("circle")
      .attr("class", "flow-dot")
      .attr("r", 3)
      .attr("fill", link.color)
      .attr("opacity", 0.8)
      .attr("cx", s.x).attr("cy", s.y);

    dot.transition()
      .delay(i * 300)
      .duration(1500)
      .ease(d3.easeQuadInOut)
      .attr("cx", t.x).attr("cy", t.y)
      .attr("opacity", 0)
      .remove();
  });
  setTimeout(animateFlow, 2500);
}
setTimeout(animateFlow, 1500);
</script>
</body>
</html>
